about:
  - I am a Ph.D. student at HKUST, advised by Prof. Qifeng Chen, and a research intern at Ant Group. My work focuses on controllable generation, interactive systems, and real-time visual models.
  - I enjoy working across the full stack of a research project, from model training and post-training to interfaces and deployment. Recent projects include MagicQuill, CausalCine, and LingBot-World-Infinity.

