about:
  - My research sits at the intersection of generative modeling, human-AI interaction, and real-time systems. I build models and tools that make visual creation more controllable, immediate, and accessible.
  - My recent work moves from precise image editing with MagicQuill to real-time video generation and open-ended interactive worlds. I am especially interested in systems that understand creative intent and respond with useful, high-fidelity visual feedback.

focus:
  - Controllable generation
